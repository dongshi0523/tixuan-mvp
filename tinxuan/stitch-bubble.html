<style>



/* Stitch Design System */
:root {
  --glass-bg: rgba(255,255,255,0.06);
  --glass-border: rgba(255,255,255,0.1);
  --glass-blur: blur(20px);
  --text-primary: #fff;
  --text-secondary: rgba(255,255,255,0.5);
  --shadow-float: 0 20px 60px rgba(0,0,0,0.5);
}

* { margin:0; padding:0; box-sizing:border-box; }

html, body {
  width:100%; height:100%; overflow:hidden;
  font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
}

/* 星空深空背景 */
.cosmos {
  position: fixed; inset:0; z-index:0;
  background: 
    radial-gradient(ellipse 80% 60% at 30% 20%, rgba(100,60,255,0.15) 0%, transparent 50%),
    radial-gradient(ellipse 60% 50% at 70% 60%, rgba(255,107,53,0.1) 0%, transparent 50%),
    radial-gradient(ellipse 50% 40% at 50% 80%, rgba(0,188,212,0.08) 0%, transparent 50%),
    linear-gradient(180deg, #0a0a1e 0%, #120a2e 50%, #0d0828 100%);
}

/* 星光粒子系统 */
.starfield {
  position: fixed; inset:0; z-index:1; pointer-events:none;
}
.starfield canvas { width:100%; height:100%; }

/* 景深层 - 远处模糊大气泡 */
.atmosphere {
  position: fixed; inset:0; z-index:2; pointer-events:none;
}

.atmo-orb {
  position: absolute; border-radius: 50%; filter: blur(40px);
  animation: atmoFloat 12s ease-in-out infinite;
}

@keyframes atmoFloat {
  0%,100% { transform: translate(0,0) scale(1); }
  25% { transform: translate(30px,-20px) scale(1.1); }
  50% { transform: translate(-15px,25px) scale(0.9); }
  75% { transform: translate(-35px,-15px) scale(1.05); }
}

/* 标题 */
.header {
  position: fixed; top:0; left:0; right:0; z-index:20;
  text-align: center; padding: 60px 20px 20px; pointer-events:none;
}
.header h1 {
  font-size: 36px; font-weight: 900; color: #fff;
  letter-spacing: 8px;
  background: linear-gradient(180deg, #fff 0%, rgba(255,255,255,0.7) 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
  text-shadow: none;
  filter: drop-shadow(0 0 30px rgba(255,107,53,0.3));
}
.header p {
  font-size: 13px; color: rgba(255,255,255,0.35);
  letter-spacing: 4px; margin-top: 4px;
}

.help-badge {
  position: fixed;
  bottom: 120px;
  right: 20px;
  z-index: 40;
  display: flex;
  align-items: center;
  justify-content: center;
  width: 28px; height: 28px;
  border-radius: 50%;
  background: rgba(255,255,255,0.07);
  border: 1px solid rgba(255,255,255,0.14);
  color: rgba(255,255,255,0.45);
  font-size: 14px;
  font-weight: 700;
  font-family: "Georgia", serif;
  cursor: pointer;
  pointer-events: auto;
  backdrop-filter: blur(16px) saturate(180%);
  -webkit-backdrop-filter: blur(16px) saturate(180%);
  box-shadow:
    0 2px 12px rgba(0,0,0,0.2),
    inset 0 1px 0 rgba(255,255,255,0.08);
  animation: helpPulse 2.5s ease-in-out infinite;
  transition: all 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
}

@keyframes helpPulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.15); }
}

.help-badge:hover {
  animation: none;
  background: rgba(255,255,255,0.14);
  border-color: rgba(255,255,255,0.3);
  color: rgba(255,255,255,0.85);
  transform: scale(1.25);
  box-shadow:
    0 4px 20px rgba(0,0,0,0.3),
    0 0 24px rgba(255,255,255,0.12),
    inset 0 1px 0 rgba(255,255,255,0.12);
}
}
}
}

/* 气泡层 */
.bubble-layer {
  position: fixed; inset:0; z-index:10; pointer-events:none;
}

/* 单个气泡 */
.bubble {
  position: absolute; pointer-events:auto; cursor:pointer;
}

.bubble-body {
  width:100%; height:100%; border-radius:50%;
  position:relative;
  box-shadow:
    0 10px 40px rgba(0,0,0,0.35),
    0 0 30px var(--glow),
    0 0 80px var(--glow-faint),
    inset 0 -8px 20px rgba(0,0,0,0.15);
  border: 1.5px solid rgba(255,255,255,0.12);
  animation: bubbleBreathe var(--breathe-dur) ease-in-out infinite;
  transition: box-shadow 0.4s ease, border-color 0.4s ease;
}

/* 高光反射 (左上) */
.bubble-body::before {
  content:''; position:absolute;
  inset: 10% 20% 55% 18%;
  border-radius:50%;
  background: radial-gradient(ellipse at 50% 50%, rgba(255,255,255,0.6) 0%, transparent 70%);
  transform: rotate(-20deg);
}

/* 次高光 (右下微光) */
.bubble-body::after {
  content:''; position:absolute;
  inset: 60% 15% 12% 55%;
  border-radius:50%;
  background: radial-gradient(ellipse at 50% 50%, rgba(255,255,255,0.15) 0%, transparent 100%);
}

@keyframes bubbleBreathe {
  0%,100% { transform: scale(1); }
  50% { transform: scale(1.04); }
}

/* 选中放大 */
.bubble.selected .bubble-body {
  animation: none;
  transform: scale(1.6);
  transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1);
  box-shadow:
    0 20px 60px rgba(0,0,0,0.5),
    0 0 50px var(--glow-bright),
    0 0 120px var(--glow-faint),
    inset 0 -6px 15px rgba(0,0,0,0.1) !important;
  border-color: rgba(255,255,255,0.3);
}

/* 非选中气泡消散 */
.bubble.dissolve {
  pointer-events:none;
}
.bubble.dissolve .bubble-body {
  animation: none;
  transition: all 0.5s ease;
  opacity:0; transform: scale(0.15);
}

/* 爆开碎片 */
.spark {
  position: fixed; border-radius:50%; pointer-events:none; z-index:200;
  animation: sparkBurst 0.8s ease-out forwards;
}

@keyframes sparkBurst {
  0% { opacity:1; transform: translate(0,0) scale(1); }
  100% { opacity:0; transform: translate(var(--dx),var(--dy)) scale(0); }
}

/* 底部控制栏 - 毛玻璃 */
/* 忌口面板 */
.prefs-panel { position:fixed; bottom:0; left:0; right:0; z-index:200; transform:translateY(100%); transition:transform 0.35s ease; }
.prefs-panel.open { transform:translateY(0); }
.prefs-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.5); opacity:0; pointer-events:none; transition:opacity 0.35s ease; }
.prefs-panel.open .prefs-overlay { opacity:1; pointer-events:auto; }
.prefs-sheet { background:rgba(20,20,50,0.96); backdrop-filter:blur(30px); -webkit-backdrop-filter:blur(30px); border-radius:20px 20px 0 0; padding:12px 24px 32px; position:relative; z-index:1; max-height:65vh; overflow-y:auto; }
.prefs-handle { width:36px; height:4px; background:rgba(255,255,255,0.15); border-radius:2px; margin:10px auto; }
.prefs-title { font-size:20px; font-weight:700; color:#fff; text-align:center; margin-bottom:20px; }
.prefs-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:8px; }
.prefs-item { display:flex; align-items:center; gap:10px; cursor:pointer; padding:14px 16px; border-radius:14px; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.08); color:rgba(255,255,255,0.7); font-size:15px; font-weight:500; transition:all 0.3s; user-select:none; }
.prefs-item:has(input:checked) { background:rgba(255,107,53,0.15); border-color:rgba(255,107,53,0.4); color:#fff; }
.prefs-item input { display:none; }
.prefs-check { width:20px; height:20px; border-radius:6px; flex-shrink:0; border:2px solid rgba(255,255,255,0.25); position:relative; transition:all 0.3s; }
.prefs-item input:checked + .prefs-check { background:#FF6B35; border-color:#FF6B35; }
.prefs-item input:checked + .prefs-check::after { content:""; position:absolute; left:5px; top:2px; width:6px; height:11px; border:solid #fff; border-width:0 2px 2px 0; transform:rotate(45deg); }

.footer-bar {
  position: fixed; bottom: 0; left:0; right:0; z-index:30;
  padding: 20px 20px 40px;
  display: flex; justify-content: center; gap: 12px;
}

.glass-btn {
  padding: 14px 28px; border-radius: 30px;
  background: var(--glass-bg);
  backdrop-filter: var(--glass-blur);
  -webkit-backdrop-filter: var(--glass-blur);
  border: 1px solid var(--glass-border);
  color: var(--text-primary);
  font-size: 15px; font-weight: 600; letter-spacing: 2px;
  cursor: pointer;
  transition: all 0.3s ease;
  -webkit-tap-highlight-color: transparent;
}
.glass-btn:hover, .glass-btn:active {
  background: rgba(255,255,255,0.12);
  border-color: rgba(255,255,255,0.25);
  transform: translateY(-1px);
}
.glass-btn.primary {
  background: linear-gradient(135deg, rgba(255,107,53,0.6), rgba(229,57,53,0.5));
  border-color: rgba(255,255,255,0.2);
  color: #fff;
  font-weight: 700;
  box-shadow: 0 8px 30px rgba(255,107,53,0.2);
}

/* 结果卡片 */
.card-overlay {
  position: fixed; inset:0; z-index:300;
  background: rgba(0,0,0,0.5);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  display:flex; align-items:center; justify-content:center;
  opacity:0; pointer-events:none;
  transition: opacity 0.3s ease;
}
.card-overlay.open { opacity:1; pointer-events:auto; }

.card {
  background: rgba(255,255,255,0.95);
  backdrop-filter: blur(30px);
  -webkit-backdrop-filter: blur(30px);
  border-radius: 24px;
  padding: 32px 28px 28px;
  width: min(90vw, 360px);
  text-align: center;
  box-shadow: 0 30px 80px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.1);
  animation: cardPop 0.45s cubic-bezier(0.34,1.56,0.64,1);
}
@keyframes cardPop {
  from { transform:scale(0.3); opacity:0; }
  to { transform:scale(1); opacity:1; }
}
.card-emoji { font-size: 48px; margin-bottom: 8px; }
.card-name { font-size: 24px; font-weight: 800; color: #1a1a2e; margin-bottom: 4px; }
.card-cat {
  display: inline-block; padding: 5px 16px; border-radius: 20px;
  font-size: 13px; font-weight: 700; color: #fff;
  background: linear-gradient(135deg, #FF6B35, #E53935);
  margin-bottom: 16px;
}
.card-meta {
  display: flex; justify-content: center; gap: 20px;
  margin-bottom: 14px;
  font-size: 14px; font-weight: 600; color: #555;
}
.card-tags {
  display: flex; flex-wrap: wrap; justify-content: center; gap: 6px;
  margin-bottom: 8px;
}
.card-tag {
  padding: 4px 12px; border-radius: 16px;
  font-size: 12px; font-weight: 500;
  background: #f5f0eb; color: #777;
}
.card-hint {
  font-size: 11px; color: #aaa; margin-bottom: 20px;
}
.card-actions { display: flex; gap: 12px; }
.card-actions button {
  flex:1; padding: 13px 16px; border-radius: 14px; border: none;

}
.card-actions button:active { transform:scale(0.96); }
.btn-ghost { background: #f0f0f0; color: #555; }
.btn-cta { background: linear-gradient(135deg,#FF6B35,#E53935); color:#fff; }
.help-dialog {
  background: rgba(255,255,255,0.95);

  border-radius: 24px;
  padding: 32px 28px 28px;

  max-height: 80vh;
  overflow-y: auto;
}
.help-emoji { font-size: 44px; margin-bottom: 6px; }
.help-title { font-size: 22px; font-weight: 800; color: #1a1a2e; margin-bottom: 16px; }
.help-body {

.help-body p { margin-bottom: 10px; }
.help-body h4 {

.help-body ol, .help-body ul { padding-left: 20px; margin-bottom: 6px; }
.help-body li { margin-bottom: 4px; }




</style>

<script>

// ===== 全局状态 =====
const LS_KEY = 'tinxuan_prefs';
const ALL_CATEGORIES = ['面食','汉堡','烧烤','川菜','粤菜','日料','韩餐','甜品'];
const TABOO_MAP = {'辣':'辣','香菜':'香菜','海鲜':'海鲜','内脏':'内脏','牛肉':'牛肉','甜':'甜'};
const BUBBLE_COLORS = [
  { fill:'rgba(255,107,53,0.28)',  fill2:'rgba(255,107,53,0.55)',  glow:'rgba(255,107,53,0.6)',  faint:'rgba(255,107,53,0.15)' },
  { fill:'rgba(255,193,7,0.28)',   fill2:'rgba(255,193,7,0.55)',   glow:'rgba(255,193,7,0.6)',   faint:'rgba(255,193,7,0.15)' },
  { fill:'rgba(255,107,107,0.28)', fill2:'rgba(255,107,107,0.55)', glow:'rgba(255,107,107,0.6)', faint:'rgba(255,107,107,0.15)' },
  { fill:'rgba(156,39,176,0.28)',  fill2:'rgba(156,39,176,0.55)',  glow:'rgba(156,39,176,0.6)',  faint:'rgba(156,39,176,0.15)' },
  { fill:'rgba(33,150,243,0.28)',  fill2:'rgba(33,150,243,0.55)',  glow:'rgba(33,150,243,0.6)',  faint:'rgba(33,150,243,0.15)' },
  { fill:'rgba(0,188,212,0.28)',   fill2:'rgba(0,188,212,0.55)',   glow:'rgba(0,188,212,0.6)',   faint:'rgba(0,188,212,0.15)' },
  { fill:'rgba(76,175,80,0.28)',   fill2:'rgba(76,175,80,0.55)',   glow:'rgba(76,175,80,0.6)',   faint:'rgba(76,175,80,0.15)' },
  { fill:'rgba(229,57,53,0.28)',   fill2:'rgba(229,57,53,0.55)',   glow:'rgba(229,57,53,0.6)',   faint:'rgba(229,57,53,0.15)' },
];

let shops=[], filteredShops=[], activeTaboos=[], categoryStats=[];
let bubbles=[], animId=null, exploding=false, usedShopIds=new Set();
let currentCategory=null, ww=innerWidth, wh=innerHeight;

const layer=document.getElementById('bubbleLayer');
const overlay=document.getElementById('cardOverlay');
const cardEl=document.getElementById('cardContent');
const helpBadge=document.getElementById('helpBadge');
const helpOverlayEl=document.getElementById('helpOverlay');
const btnCloseHelpEl=document.getElementById('btnCloseHelp');
const prefsPanelEl=document.getElementById('prefsPanel');
const prefsOverlayEl=document.getElementById('prefsOverlay');
const btnSavePrefsEl=document.getElementById('btnSavePrefs');
const prefsGridEl=document.getElementById('prefsGrid');
const btnPrefsEl=document.getElementById('btnPrefs');
const btnSpinEl=document.getElementById('btnSpin');

// 星光 Canvas
(()=>{
  const cv=document.getElementById('starCanvas'),ctx=cv.getContext('2d');
  let stars=[],W,H;
  function rs(){W=cv.width=innerWidth;H=cv.height=innerHeight;}
  rs();addEventListener('resize',rs);
  for(let i=0;i<100;i++)stars.push({x:Math.random()*W,y:Math.random()*H,r:.5+Math.random()*1.5,a:.2+Math.random()*.6,s:.002+Math.random()*.005,p:Math.random()*Math.PI*2});
  function dr(t){ctx.clearRect(0,0,W,H);stars.forEach(s=>{const a=s.a*(.3+.7*Math.abs(Math.sin(t*s.s+s.p)));ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fillStyle='rgba(255,255,255,'+a+')';ctx.fill();});requestAnimationFrame(dr);}
  requestAnimationFrame(dr);
})();

// 数据
function loadData(){
  if(typeof SHOPS_DATA!=='undefined'&&SHOPS_DATA.shops)shops=SHOPS_DATA.shops;
  else shops=[];
  applyFilters();
}
function loadPrefs(){
  try{const s=localStorage.getItem(LS_KEY);activeTaboos=s?JSON.parse(s):[];}catch(e){activeTaboos=[];}
  prefsGridEl.querySelectorAll('input').forEach(cb=>{cb.checked=activeTaboos.includes(cb.value);});
}
function savePrefs(){
  activeTaboos=[];
  prefsGridEl.querySelectorAll('input').forEach(cb=>{if(cb.checked)activeTaboos.push(cb.value);});
  try{localStorage.setItem(LS_KEY,JSON.stringify(activeTaboos));}catch(e){}
}
function applyFilters(){
  if(!shops.length)return;
  filteredShops=shops.filter(shop=>{
    for(const t of activeTaboos){
      const kw=TABOO_MAP[t];if(!kw)continue;
      if(kw==='辣'){if(shop.tags.includes('不辣'))continue;if(shop.tags.some(tg=>tg.includes('辣')))return false;}
      else if(kw==='甜'){if(shop.tags.includes('甜'))return false;}
      else{if(shop.tags.includes(kw))return false;}
    }
    return true;
  });
  categoryStats=ALL_CATEGORIES.map(cn=>{const cs=filteredShops.filter(s=>s.category===cn);return{name:cn,count:cs.length,shops:cs,available:cs.length>0};});
  rebuildBubbles();
}

// 气泡
function makeBubble(id,ci){
  const s=48+Math.random()*56;
  const c=BUBBLE_COLORS[ci%BUBBLE_COLORS.length];
  const w=document.createElement('div');w.className='bubble';
  w.style.width=s+'px';w.style.height=s+'px';
  w.style.left=Math.random()*(ww-s)+'px';
  w.style.top=Math.random()*(wh-s)+'px';
  w.style.zIndex=Math.floor(s);
  const bd=document.createElement('div');bd.className='bubble-body';
  bd.style.background='radial-gradient(circle at 38% 28%, rgba(255,255,255,0.2), '+c.fill+')';
  bd.style.setProperty('--glow',c.glow);
  bd.style.setProperty('--glow-faint',c.faint);
  bd.style.setProperty('--glow-bright',c.fill2);
  bd.style.setProperty('--breathe-dur',(2.5+Math.random()*3)+'s');
  w.appendChild(bd);layer.appendChild(w);
  const d={el:w,body:bd,id,size:s,x:parseFloat(w.style.left),y:parseFloat(w.style.top),vx:(Math.random()-.5)*.9,vy:(Math.random()-.5)*.9,color:c,alive:true,ci,cn:ALL_CATEGORIES[ci]};
  const cl=()=>{if(!exploding)onTap(d);};
  w.addEventListener('click',cl);
  w.addEventListener('touchstart',e=>{e.preventDefault();cl();},{passive:false});
  return d;
}

function rebuildBubbles(){
  cancelAnimationFrame(animId);layer.innerHTML='';
  bubbles.forEach(b=>b.alive=false);bubbles=[];
  const av=categoryStats.filter(c=>c.available);
  if(!av.length)return;
  let tc=0;
  av.forEach(c=>{tc+=Math.max(1,Math.ceil(c.count/2));});
  tc=Math.min(tc,20);
  let idx=0;
  for(const cat of categoryStats){
    if(!cat.available)continue;
    const n=Math.max(1,Math.round(tc*cat.count/filteredShops.length));
    for(let i=0;i<n;i++)bubbles.push(makeBubble(idx++,ALL_CATEGORIES.indexOf(cat.name)));
  }
  startLoop();
}

function startLoop(){
  const tk=()=>{
    if(!exploding){
      ww=innerWidth;wh=innerHeight;
      for(const b of bubbles){
        if(!b.alive)continue;
        b.x+=b.vx;b.y+=b.vy;
        if(b.x<=-5){b.x=-5;b.vx*=-1;}
        if(b.x+b.size>=ww+5){b.x=ww+5-b.size;b.vx*=-1;}
        if(b.y<=-5){b.y=-5;b.vy*=-1;}
        if(b.y+b.size>=wh+5){b.y=wh+5-b.size;b.vy*=-1;}
        b.el.style.left=b.x+'px';b.el.style.top=b.y+'px';
      }
    }
    animId=requestAnimationFrame(tk);
  };
  tk();
}

function onTap(d){
  exploding=true;
  d.el.style.transition='all 0.4s cubic-bezier(0.34,1.56,0.64,1)';
  d.el.style.left=(ww/2-d.size/2)+'px';
  d.el.style.top=(wh/2-d.size/2)+'px';
  d.el.classList.add('selected');
  bubbles.forEach(b=>{if(b!==d)b.el.classList.add('dissolve');});
  setTimeout(()=>{burst(d);d.el.style.opacity='0';d.el.style.transform='scale(3)';setTimeout(()=>showCard(d),450);},400);
}

function burst(d){
  const cx=ww/2,cy=wh/2;
  for(let i=0;i<30;i++){
    const p=document.createElement('div');p.className='spark';
    const sz=2+Math.random()*10;
    p.style.width=sz+'px';p.style.height=sz+'px';
    p.style.background='radial-gradient(circle, rgba(255,255,255,0.8), '+d.color.fill2+')';
    p.style.left=cx+'px';p.style.top=cy+'px';
    const a=Math.random()*Math.PI*2,dist=40+Math.random()*200;
    p.style.setProperty('--dx',Math.cos(a)*dist+'px');
    p.style.setProperty('--dy',Math.sin(a)*dist+'px');
    document.body.appendChild(p);
    setTimeout(()=>p.remove(),800);
  }
}

function showCard(d){
  usedShopIds.clear();
  const cs=categoryStats.find(c=>c.name===d.cn);
  currentCategory=cs;
  if(!cs||!cs.shops.length)return resetAll();
  showShop(cs);
}

function showShop(cat){
  const av=cat.shops.filter(s=>!usedShopIds.has(s.id));
  if(!av.length){usedShopIds.clear();return showShop(cat);}
  const shop=av[Math.floor(Math.random()*av.length)];
  usedShopIds.add(shop.id);
  window._cs=shop;
  cardEl.innerHTML='<div class="card-emoji">🎉</div><div class="card-cat">'+cat.name+'</div><div class="card-name">'+shop.name+'</div><div class="card-meta"><span>💰 人均¥'+shop.avg_price+'</span><span>⭐ '+shop.rating+'分</span><span>📍 '+shop.distance+'km</span></div><div class="card-tags">'+shop.tags.map(t=>'<span class="card-tag">'+t+'</span>').join('')+'</div><p class="card-hint">点击"就选这个"将自动跳转美团外卖搜索页</p><div class="card-actions"><button class="btn-ghost" id="btnAgain">🔄 换一个</button><button class="btn-cta" id="btnGo">🛒 就选这个</button></div>';
  overlay.classList.add('open');
  document.getElementById('btnAgain').addEventListener('click',()=>{overlay.classList.remove('open');resetAll();setTimeout(()=>{const al=bubbles.filter(b=>b.alive);if(al.length)onTap(al[Math.floor(Math.random()*al.length)]);},1200);});
  document.getElementById('btnGo').addEventListener('click',()=>{const s=window._cs;if(s&&s.link){overlay.classList.remove('open');window.open(s.link,'_blank');resetAll();}});
}

function resetAll(){
  overlay.classList.remove('open');exploding=false;
  cancelAnimationFrame(animId);layer.innerHTML='';
  bubbles.forEach(b=>b.alive=false);bubbles=[];
  const av=categoryStats.filter(c=>c.available);
  let tc=0;
  av.forEach(c=>{tc+=Math.max(1,Math.ceil(c.count/2));});
  tc=Math.min(tc,20);
  let idx=0;
  for(const cat of categoryStats){
    if(!cat.available)continue;
    const n=Math.max(1,Math.round(tc*cat.count/filteredShops.length));
    for(let i=0;i<n;i++){
      const b=makeBubble(idx++,ALL_CATEGORIES.indexOf(cat.name));
      b.el.style.left=(ww/2-b.size/2)+'px';
      b.el.style.top=(wh/2-b.size/2)+'px';
      b.el.style.opacity='0';b.el.style.transform='scale(0)';b.alive=false;
      bubbles.push(b);
      const dly=idx*55;
      setTimeout(()=>{
        b.el.style.transition='all 0.6s cubic-bezier(0.34,1.56,0.64,1)';
        b.el.style.left=(Math.random()*(ww-b.size))+'px';
        b.el.style.top=(Math.random()*(wh-b.size))+'px';
        b.el.style.opacity='1';b.el.style.transform='scale(1)';
        b.x=parseFloat(b.el.style.left);b.y=parseFloat(b.el.style.top);
        setTimeout(()=>{b.alive=true;b.el.style.transition='';},600);
      },dly);
    }
  }
  startLoop();
}

// 事件
helpBadge.addEventListener('click',()=>{helpOverlayEl.classList.add('open');});
btnCloseHelpEl.addEventListener('click',()=>{helpOverlayEl.classList.remove('open');});
helpOverlayEl.addEventListener('click',e=>{if(e.target===helpOverlayEl)helpOverlayEl.classList.remove('open');});
btnPrefsEl.addEventListener('click',()=>{prefsPanelEl.classList.add('open');});
prefsOverlayEl.addEventListener('click',()=>{prefsPanelEl.classList.remove('open');});
btnSavePrefsEl.addEventListener('click',()=>{savePrefs();applyFilters();prefsPanelEl.classList.remove('open');});
btnSpinEl.addEventListener('click',()=>{
  if(exploding)return;
  const al=bubbles.filter(b=>b.alive);
  if(!al.length)return;
  onTap(al[Math.floor(Math.random()*al.length)]);
});
addEventListener('resize',()=>{ww=innerWidth;wh=innerHeight;});

// 启动
overlay.addEventListener('click',e=>{if(e.target===overlay){overlay.classList.remove('open');resetAll();}});
loadData();
loadPrefs();

</script>
</body>
