<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>泡泡池 - 替你选</title>
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#8c4a00',
            'primary-container': '#fd8b00',
            'secondary-container': '#fecb00',
            tertiary: '#006b1b',
            surface: '#fbf5f0',
            'surface-container': '#ede7e2',
            'surface-container-low': '#f6f0ea',
            'surface-container-lowest': '#ffffff',
            'on-surface': '#302e2b',
            'on-surface-variant': '#5e5b57',
          },
          borderRadius: {
            DEFAULT: '1rem',
            lg: '2rem',
            xl: '3rem',
            full: '9999px',
          },
          fontFamily: {
            headline: ['Plus Jakarta Sans', 'sans-serif'],
            body: ['Be Vietnam Pro', 'sans-serif'],
          }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* 深色星空背景 */
    .bubble-bg {
      background: linear-gradient(160deg, #0f172a 0%, #1e1b4b 40%, #0f172a 70%, #1a1040 100%);
      min-height: 100dvh;
      position: relative;
      overflow: hidden;
    }
    #starsCanvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 0;
    }
    .bubble {
      position: absolute;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      z-index: 10;
      user-select: none;
      -webkit-user-select: none;
      transition: opacity 0.5s ease;
    }
    .bubble-inner {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid rgba(255,255,255,0.25);
      box-shadow: 0 0 30px rgba(140, 74, 0, 0.2), inset 0 0 30px rgba(255,255,255,0.05);
    }
    .bubble-inner .emoji {
      font-size: 2.5rem;
    }
    .bubble-bursting {
      animation: burst 0.5s ease-out forwards;
    }
    .bubble-fading {
      opacity: 0 !important;
      pointer-events: none;
    }
    .particle {
      position: absolute;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #fd8b00;
      animation: particle-out 0.8s ease-out forwards;
      pointer-events: none;
      z-index: 15;
    }
    /* 结果卡片 */
    #resultCard {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 50;
      transform: translateY(100%);
      transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
    }
    #resultCard.show {
      transform: translateY(0);
    }
    #overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.3);
      z-index: 40;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s ease;
    }
    #overlay.show {
      opacity: 1;
      pointer-events: auto;
    }
  </style>
</head>
<body class="bubble-bg font-body">

  <div id="toast-container"></div>

  <!-- 星空 Canvas -->
  <canvas id="starsCanvas"></canvas>

  <!-- 遮罩层 -->
  <div id="overlay" onclick="closeResult()"></div>

  <!-- 顶部标题 -->
  <div class="relative z-20 max-w-2xl mx-auto px-4 pt-6">
    <div class="flex items-center gap-3 mb-2">
      <button onclick="history.back()" class="btn-press w-10 h-10 flex items-center justify-center rounded-full bg-white/10 backdrop-blur-md">
        <span class="material-symbols-outlined text-white">arrow_back</span>
      </button>
      <h1 class="font-headline text-xl font-bold text-white">替你选</h1>
    </div>
    <p class="text-white/60 text-sm ml-13 pl-1">让命运决定你的下一餐</p>
  </div>

  <!-- 气泡层 -->
  <div id="bubbleLayer" class="relative z-10" style="height: calc(100dvh - 120px);">
  </div>

  <!-- 结果卡片 -->
  <div id="resultCard" class="max-w-2xl mx-auto w-full">
    <div class="glass-strong rounded-t-[2.5rem] px-6 pt-8 pb-10 shadow-ambient-lg mx-2" style="padding-bottom: calc(40px + env(safe-area-inset-bottom, 0px));">
      <div class="w-12 h-1.5 bg-surface-container rounded-full mx-auto mb-6"></div>

      <h2 class="font-headline text-2xl font-bold text-on-surface text-center mb-1" id="resultName"></h2>
      <p class="text-on-surface-variant text-sm text-center mb-5" id="resultCategory"></p>

      <div class="flex justify-center gap-6 mb-5">
        <div class="text-center">
          <p class="text-xs text-on-surface-variant mb-1">人均</p>
          <p class="font-headline text-lg font-bold text-primary" id="resultPrice"></p>
        </div>
        <div class="text-center">
          <p class="text-xs text-on-surface-variant mb-1">评分</p>
          <p class="font-headline text-lg font-bold text-primary">⭐ <span id="resultRating"></span></p>
        </div>
        <div class="text-center">
          <p class="text-xs text-on-surface-variant mb-1">距离</p>
          <p class="font-headline text-lg font-bold text-primary" id="resultDistance"></p>
        </div>
      </div>

      <div class="flex flex-wrap justify-center gap-2 mb-5" id="resultTags"></div>

      <p class="text-center text-xs text-on-surface-variant mb-6">点击「就选这个」将自动跳转美团外卖搜索页</p>

      <div class="flex gap-3">
        <button id="btnReroll" class="btn-press flex-1 py-3.5 rounded-full font-headline font-semibold text-on-surface bg-surface-container-low shadow-ambient transition-colors">
          🔄 换一个
        </button>
        <button id="btnConfirm" class="btn-press flex-[2] py-3.5 rounded-full font-headline font-semibold text-white cta-gradient shadow-ambient-lg transition-colors">
          🛒 就选这个
        </button>
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
  <script src="js/data.js"></script>
  <script src="js/algorithm.js"></script>
  <script src="js/bubble.js"></script>
</body>
</html>
